	<div id="login">
		<!--div class="title">_(Log in)</div-->
		<form id="login_form" action="TestLogin" class="table" data-module="User">
			<div class="entry cell">
				<input type="hidden" name="blackphp_device_code" class="persistent_input">
				<input type="text" name="nickname" placeholder="_(User)" required>
			</div>
			<div class="entry cell">
				<input class="password_input" type="password" name="password" placeholder="_(Password)" required>
			</div>
			<div class="entry cell">
				<button class="blue_button" type="submit" id="login_button">
					<img src="public/images/outline/login.png" class="x-small_icon">
					_(Log in)
				</button>
			</div>
		</form>
		<div class="sending">
			<img src="public/images/loading.gif" class="medium_icon">
			<span>_(Logging in)...</span>
		</div>
		<div class="error">
			<img src="public/images/error.png" class="small_icon">
			<span>Error</span>
		</div>
		<div class="success">
			<img src="public/images/success.png" class="small_icon">
			<span>_(Success)</span>
		</div>
	</div>
	<div class="content table">
		<div class="cell pc_cell">
			<img src="public/images/app_logo_light.png" alt="App logo">
			<p>{{ app_name }}</p>
		</div>
		<div class="cell">
			<p>_(Provided to):</p>
			<img src="{{ entity_logo }}">
		</div>
	</div>
	<div class="bottom_links">
		<a href="https://www.blackphp.com">www.blackphp.com</a>
		<a href="https://www.algoritmia.sv">www.algoritmia.sv</a>
		<a href="#alert" data-title="_(Technical support)" data-href="index/technical_support_loader/standalone/">_(Technical support)</a>
		<a href="{{ user_manual }}">_(User manual)</a>
		<a href="#alert" data-title="{{ about }}" data-href="Settings/info_details_loader/standalone/">{{ about }}</a>
	</div>
